name: CI

# Run on every PR into main (and on main itself) so the test suites gate merges.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  unit:
    name: unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test

  e2e:
    name: e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Chromium + its OS libraries; the e2e harness drives it headless.
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      # Keep the Playwright report/traces when something fails.
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
