name: CI

# Run on every PR into main (and on main itself) so the test suites gate merges.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  unit:
    name: unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test

  e2e:
    name: e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      # Chromium + its OS libraries; the e2e harness drives it headless.
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      # Keep the Playwright report/traces when something fails.
      - uses: actions/upload-artifact@v5
        if: failure()
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  # Gate: a PR that changes packages/* must ship a changeset, so the merge to main
  # auto-bumps + publishes (see release.yml). `changeset status` exits non-zero when
  # packages changed without a covering changeset.
  changeset:
    name: changeset
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx changeset status --since=origin/${{ github.base_ref }}

  pack-smoke:
    name: pack-smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      # Build → pack → fresh-install the tarballs into a clean app → assert the
      # published bits actually work (server connects, an edit round-trips). Catches
      # packaging regressions the workspace-linked e2e suite can't (files/exports/bin).
      - run: npm run test:pack
      - uses: actions/upload-artifact@v5
        if: failure()
        with:
          name: pack-smoke-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
